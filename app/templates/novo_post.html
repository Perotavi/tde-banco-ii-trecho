{% extends "base.html" %}

{% block title %}Novo post - Trecho{% endblock %}

{% block content %}

<section class="auth-card">
    <h1>Novo post</h1>
    <p class="subtitle">Publique um trecho de até 280 caracteres.</p>

    <form method="POST" class="form">
        <label for="conteudo">Conteúdo</label>
        <textarea
            id="conteudo"
            name="conteudo"
            rows="5"
            maxlength="280"
            placeholder="Escreva seu trecho..."
            required
        ></textarea>

        <button type="submit">Publicar</button>
    </form>
</section>

{% endblock %}
